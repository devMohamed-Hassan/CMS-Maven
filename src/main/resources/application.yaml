server:
  port: 8080

spring:
  application:
    name: course-management-system
  datasource:
    url: jdbc:mysql://localhost:3306/course_management?createDatabaseIfNotExist=true
    username: root
    password: admin@123
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.hibernate.SQL: debug
